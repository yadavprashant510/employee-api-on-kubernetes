apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: employee-api-hpa
  namespace: employee

spec:

  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: employee-api

  minReplicas: 2

  maxReplicas: 10

  metrics:

  - type: Resource

    resource:

      name: cpu

      target:

        type: Utilization

        averageUtilization: 50