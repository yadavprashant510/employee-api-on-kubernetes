apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-api
  namespace: employee
  labels:
      app: employee-api
      environment: development
spec:
  replicas: 2
  selector:
    matchLabels:
      app: employee-api
  template:
    metadata:
      name: employee-api-pod
      labels:
        app: employee-api
    spec:
      containers:
      - name: employee-api
        image: employee-api:v4
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        ports:
        - containerPort: 5000
        startupProbe:

          httpGet:

            path: /health

            port: 5000

          periodSeconds: 5

          failureThreshold: 30

        livenessProbe:

          httpGet:

            path: /health

            port: 5000

          initialDelaySeconds: 10

          periodSeconds: 10

        readinessProbe:

          httpGet:

            path: /ready

            port: 5000

          initialDelaySeconds: 5

          periodSeconds: 5
        env:
        - name: SIMULATION_MODE
          value: "normal"
        envFrom:
        - configMapRef:
            name: employee-config

        - secretRef:
            name: employee-secret
        volumeMounts:
          - name: employee-storage
            mountPath: /app/data
      volumes:
        - name: employee-storage
          persistentVolumeClaim:
            claimName: employee-pvc