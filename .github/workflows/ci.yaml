name: Continuous Integration

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: employee-api
  RELEASE_NAME: employee-api

jobs:

  ####################################################################
  # Quality Checks
  ####################################################################

  quality:
    name: Code Quality & Helm Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Check Code Formatting
        run: black --check .

      - name: Run Flake8
        run: flake8 .

      - name: Run Unit Tests
        run: pytest

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint helm/employee-api

      - name: Helm Template Validation
        run: helm template employee-api ./helm/employee-api

  ####################################################################
  # Build Docker Image and Scan for Vulnerabilities
  ####################################################################

  build:
    name: Build Scan and Push Image
    runs-on: ubuntu-latest

    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Tag Latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Push Docker Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
  update-gitops:
    name: Update GitOps Repository
    runs-on: ubuntu-latest
    needs: build

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Clone GitOps Repository
        run: |
          git clone \
          https://x-access-token:${{ secrets.PLATFORM_REPO_TOKEN }}@github.com/yadavprashant510/employee-platform.git
      - name: Update Image Tag
        run: |
          cd employee-platform

          sed -i.bak \
          "s/tag:.*/tag: \"${{ github.sha }}\"/" \
          environments/dev/values.yaml

          rm -f environments/dev/values.yaml.bak
      - name: Commit Changes
        run: |
          cd employee-platform

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add environments/dev/values.yaml

          git diff --cached --quiet || \
          git commit -m "chore: update image tag ${{ github.sha }}"

          git push origin main